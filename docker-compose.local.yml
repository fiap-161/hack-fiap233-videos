# Postgres + RabbitMQ para desenvolver e testar o serviço de vídeos (Fase 3: upload + fila + worker).
# Uso: docker compose -f docker-compose.local.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dbadmin
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: videosdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbadmin -d videosdb"]
      interval: 2s
      timeout: 2s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 5
